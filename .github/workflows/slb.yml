name: SlimBootloader build and release.

on:
  push:
    paths:
      - 'sbl/**'
    tags:
      - 'rev*'
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slimbootloader repo
        uses: actions/checkout@v6
        with:
          repository: slimbootloader/slimbootloader
          ref: master
      # - name: Checkout
      #   uses: actions/checkout@v6
      #   with:
      #     path: master-this
      - run: find . -maxdepth 1
      - run: |
          sudo apt update -y && 
          sudo apt install -ybuild-essential python3 python-is-python3 \
            uuid-dev nasm openssl gcc-multilib git m4 bison flex 
      - run: |
          git config --global user.name "Name" &&
          git config --global user.email "name@yourname.com"
      - run: | 
          python3 BuildLoader.py clean &&
          mkdir sblkeys && 
          python3 BootloaderCorePkg/Tools/GenerateKeys.py -k sblkeys &&
          python3 BuildLoader.py build qemu
        env: 
          SBL_KEY_DIR: ${{ github.workspace }}/sblkeys
      - name: upload build binary 
        uses: actions/upload-artifact@v4
        with:
          name: slimbootloader.bin
          path: Outputs/qemu/SlimBootloader.bin

